<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aizaro King</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* شبكة الخطوط المتحركة الخلفية */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* كرت البروفايل - تم تصغير الحجم والأبعاد ليصبح ملموم واحترافي */
        .profile-card {
            position: relative;
            z-index: 2;
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 20px;
            max-width: 320px; /* تم تصغير العرض من 380 إلى 320 */
            width: 85%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(255, 255, 255, 0.03);
            text-align: center;
            margin: 20px;
        }

        /* تصغير حجم الصورة الشخصية */
        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            object-fit: cover;
        }

        /* تصغير حجم خط الاسم */
        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 12px 0 4px;
            letter-spacing: 0.5px;
        }

        /* تصغير خط الموقع */
        .location {
            color: #a0aec0;
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 22px;
        }

        .links-container {
            width: 100%;
        }

        /* أزرار الروابط - مصغرة وأكثر انسيابية وعصرية */
        .link-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 12px; /* تقليل المسافات الداخلية لتصغير الزر */
            margin: 10px 0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #f7fafc;
            text-decoration: none;
            font-size: 14px; /* تصغير حجم الخط بداخل الأزرار */
            font-weight: 500;
            transition: all 0.25s ease-in-out;
        }

        .link-card i {
            font-size: 16px; /* تصغير حجم الأيقونات */
            width: 20px;
            text-align: center;
        }

        /* تأثير التمرير والضغط السلس والأنيق باللون الأبيض */
        .link-card:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            border-color: #ffffff;
        }
        
        .link-card:hover i {
            color: #000000 !important;
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="profile-card">
        <img src="profile.png" alt="Aizaro" class="profile-img">
        
        <h1>AIZARO KING</h1>
        <div class="location">Morocco 🇲🇦</div>

        <div class="links-container">
            <a href="https://discord.com/invite/5b9N3kaTb9" target="_blank" class="link-card">
                <i class="fab fa-discord" style="color: #5865F2;"></i> Discord
            </a>
            
            <a href="https://t.me/addlist/ucGIsjr5HtRjNjc8" target="_blank" class="link-card">
                <i class="fab fa-telegram" style="color: #24A1DE;"></i> Telegram
            </a>
            
            <a href="https://youtube.com/@aizaroking" target="_blank" class="link-card">
                <i class="fab fa-youtube" style="color: #FF0000;"></i> YouTube
            </a>

            <a href="https://tiktok.com/@aizaroking" target="_blank" class="link-card">
                <i class="fab fa-tiktok" style="color: #FFFFFF;"></i> TikTok
            </a>

            <a href="https://instagram.com/aizaroking" target="_blank" class="link-card">
                <i class="fab fa-instagram" style="color: #E1306C;"></i> Instagram
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        const maxDistance = 100; // المسافة التي تظهر عندها الخطوط المترابطة بين النقاط

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2; // حركة بطيئة وناعمة جداً
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            // تحديد عدد النقاط بناءً على حجم الشاشة لتفادي البطء
            const numberOfParticles = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // رسم الخطوط المترابطة بين الجسيمات القريبة من بعضها
        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    const dx = particlesArray[a].x - particlesArray[b].x;
                    const dy = particlesArray[a].y - particlesArray[b].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        const opacity = 1 - (distance / maxDistance);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.15})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connectParticles();
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
