<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aizaro King</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <style>
        body {
            background-color: #030303;
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* شبكة الخطوط المتحركة الخلفية */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* كرت البروفايل المتناسق */
        .profile-card {
            position: relative;
            z-index: 2;
            background: rgba(12, 12, 12, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 20px;
            border-radius: 24px;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
            text-align: center;
            margin: 20px;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
            object-fit: cover;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 12px 0 4px;
            letter-spacing: 0.5px;
        }

        .location {
            color: #a0aec0;
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 25px;
        }

        .links-container {
            width: 100%;
        }

        /* نمط الأزرار الجديد - شفاف بالكامل ومبني على توهج الأيقونة */
        .link-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px 18px;
            margin: 12px 0;
            border-radius: 14px;
            display: flex;
            align-items: center;
            color: #cbd5e1;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        /* حجم وتوهج الأيقونة الثابت */
        .link-card i {
            font-size: 19px;
            width: 30px;
            text-align: left;
            transition: all 0.3s ease;
        }

        /* محاذاة النص في المنتصف */
        .link-text {
            flex-grow: 1;
            text-align: center;
            margin-right: 30px;
        }

        /* تأثيرات التمرير الحركية الجديدة مع تفتيح الإطار وتوهج الأيقونات */
        .link-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            transform: translateX(4px); /* حركة انزلاق خفيفة لليمين بدل الارتفاع */
        }

        /* توهج النيون للأيقونات عند التمرير */
        .discord-btn:hover i { text-shadow: 0 0 10px #5865F2, 0 0 20px #5865F2; color: #5865F2 !important; }
        .telegram-btn:hover i { text-shadow: 0 0 10px #24A1DE, 0 0 20px #24A1DE; color: #24A1DE !important; }
        .youtube-btn:hover i { text-shadow: 0 0 10px #FF0000, 0 0 20px #FF0000; color: #FF0000 !important; }
        .tiktok-btn:hover i { text-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff; color: #ffffff !important; }
        .instagram-btn:hover i { text-shadow: 0 0 10px #E1306C, 0 0 20px #E1306C; color: #E1306C !important; }

    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="profile-card">
        <img src="profile.png" alt="Aizaro" class="profile-img">
        
        <h1>AIZARO KING</h1>
        <div class="location">Morocco 🇲🇦</div>

        <div class="links-container">
            <a href="https://discord.com/invite/5b9N3kaTb9" target="_blank" class="link-card discord-btn">
                <i class="fab fa-discord" style="color: #5865F2;"></i>
                <div class="link-text">Discord</div>
            </a>
            
            <a href="https://t.me/addlist/ucGIsjr5HtRjNjc8" target="_blank" class="link-card telegram-btn">
                <i class="fab fa-telegram" style="color: #24A1DE;"></i>
                <div class="link-text">Telegram</div>
            </a>
            
            <a href="https://youtube.com/@aizaroking" target="_blank" class="link-card youtube-btn">
                <i class="fab fa-youtube" style="color: #FF0000;"></i>
                <div class="link-text">YouTube</div>
            </a>

            <a href="https://tiktok.com/@aizaroking" target="_blank" class="link-card tiktok-btn">
                <i class="fab fa-tiktok" style="color: #FFFFFF;"></i>
                <div class="link-text">TikTok</div>
            </a>

            <a href="https://instagram.com/aizaroking" target="_blank" class="link-card instagram-btn">
                <i class="fab fa-instagram" style="color: #E1306C;"></i>
                <div class="link-text">Instagram</div>
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const maxDistance = 100;

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            const numberOfParticles = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    const dx = particlesArray[a].x - particlesArray[b].x;
                    const dy = particlesArray[a].y - particlesArray[b].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < maxDistance) {
                        const opacity = 1 - (distance / maxDistance);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity * 0.12})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connectParticles();
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
