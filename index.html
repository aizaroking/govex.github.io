<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aizaro King</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <style>
        body {
            background-color: #030303;
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* الكرت الزجاجي المطور الاحترافي */
        .profile-card {
            position: relative;
            z-index: 2;
            background: rgba(15, 18, 24, 0.75); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 20px;
            border-radius: 24px;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            margin: 20px;
            animation: cardAppear 0.8s ease-out forwards;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            object-fit: cover;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 12px 0 4px;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .location {
            color: #a0aec0;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .location class="flag" {
            font-size: 16px;
        }

        .links-container {
            width: 100%;
        }

        /* ستايل الأزرار الافتراضي مع إخفاءها مبدئياً لتأثير الحركة */
        .link-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            padding: 12px 16px;
            margin: 14px 0;
            border-radius: 50px;
            display: flex;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(15px);
            animation: btnSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* تعيين ترتيب ظهور وتأخير كل زر لتأثير متتابع وخرافي */
        .discord-btn   { animation-delay: 0.3s; }
        .telegram-btn  { animation-delay: 0.45s; }
        .youtube-btn   { animation-delay: 0.6s; }
        .tiktok-btn    { animation-delay: 0.75s; }
        .instagram-btn { animation-delay: 0.9s; }

        .icon-badge {
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            margin-right: 18px;
        }

        /* ألوان الأيقونات في الحالة العادية */
        .discord-btn .icon-badge i { color: #5865F2; }
        .telegram-btn .icon-badge i { color: #24A1DE; }
        .youtube-btn .icon-badge i { color: #FF0000; }
        .tiktok-btn .icon-badge i { color: #ffffff; }
        .instagram-btn .icon-badge i { color: #E1306C; }

        /* تأثير التمرير والضغط بالألوان الرسمية */
        .discord-btn:hover {
            background: #5865F2;
            border-color: #5865F2;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5);
        }
        .discord-btn:hover .icon-badge i { color: #ffffff !important; }

        .telegram-btn:hover {
            background: #24A1DE;
            border-color: #24A1DE;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(36, 161, 222, 0.5);
        }
        .telegram-btn:hover .icon-badge i { color: #ffffff !important; }

        .youtube-btn:hover {
            background: #FF0000;
            border-color: #FF0000;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .youtube-btn:hover .icon-badge i { color: #ffffff !important; }

        .tiktok-btn:hover {
            background: #ffffff;
            border-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }
        .tiktok-btn:hover .icon-badge i { color: #000000 !important; }

        .instagram-btn:hover {
            background: #E1306C;
            border-color: #E1306C;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(225, 48, 108, 0.5);
        }
        .instagram-btn:hover .icon-badge i { color: #ffffff !important; }

        .link-card:hover {
            transform: scale(1.02);
        }

        /* قواعد تأثيرات الحركة المستحدثة */
        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes btnSlideIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="profile-card">
        <img src="profile.png" alt="Aizaro" class="profile-img">
        
        <h1>AIZARO KING</h1>
        <div class="location">Morocco <span class="flag">🇲🇦</span></div>

        <div class="links-container">
            <a href="https://discord.com/invite/5b9N3kaTb9" target="_blank" class="link-card discord-btn">
                <div class="icon-badge"><i class="fab fa-discord"></i></div>
                <div class="link-text">Discord</div>
            </a>
            
            <a href="https://t.me/addlist/ucGIsjr5HtRjNjc8" target="_blank" class="link-card telegram-btn">
                <div class="icon-badge"><i class="fab fa-telegram"></i></div>
                <div class="link-text">Telegram</div>
            </a>
            
            <a href="https://youtube.com/@aizaroking" target="_blank" class="link-card youtube-btn">
                <div class="icon-badge"><i class="fab fa-youtube"></i></div>
                <div class="link-text">YouTube</div>
            </a>

            <a href="https://tiktok.com/@aizaroking" target="_blank" class="link-card tiktok-btn">
                <div class="icon-badge"><i class="fab fa-tiktok"></i></div>
                <div class="link-text">TikTok</div>
            </a>

            <a href="https://instagram.com/aizaroking" target="_blank" class="link-card instagram-btn">
                <div class="icon-badge"><i class="fab fa-instagram"></i></div>
                <div class="link-text">Instagram</div>
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const maxDistance = 100;

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 210, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            const numberOfParticles = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    const dx = particlesArray[a].x - particlesArray[b].x;
                    const dy = particlesArray[a].y - particlesArray[b].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < maxDistance) {
                        const opacity = 1 - (distance / maxDistance);
                        ctx.strokeStyle = `rgba(0, 210, 255, ${opacity * 0.12})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connectParticles();
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
