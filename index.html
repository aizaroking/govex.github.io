<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aizaro King</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            /* تغيير الخط ليصبح ناعم وعصري مثل الصورة المرفقة */
            font-family: 'Poppins', Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00d2ff;
            box-shadow: 0 0 15px #00d2ff;
            object-fit: cover;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 15px 0 5px;
            letter-spacing: 1px;
        }
        .location {
            color: #94a3b8;
            font-size: 15px;
            font-weight: 400;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .links-container {
            max-width: 400px;
            margin: 0 auto;
        }
        .link-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            margin: 12px 0;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .link-card i {
            font-size: 22px;
            width: 25px;
            text-align: center;
        }
        .link-card:hover {
            background: #00d2ff;
            color: #0f172a;
            box-shadow: 0 0 15px #00d2ff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <img src="profile.png" alt="Aizaro" class="profile-img">
    
    <h1>AIZARO KING</h1>
    <div class="location">Morocco 🇲🇦</div>

    <div class="links-container">
        <a href="https://discord.com/invite/5b9N3kaTb9" target="_blank" class="link-card">
            <i class="fab fa-discord" style="color: #5865F2;"></i> Discord
        </a>
        
        <a href="https://t.me/addlist/ucGIsjr5HtRjNjc8" target="_blank" class="link-card">
            <i class="fab fa-telegram" style="color: #24A1DE;"></i> Telegram
        </a>
        
        <a href="https://youtube.com/@aizaroking" target="_blank" class="link-card">
            <i class="fab fa-youtube" style="color: #FF0000;"></i> YouTube
        </a>

        <a href="https://tiktok.com/@aizaroking" target="_blank" class="link-card">
            <i class="fab fa-tiktok" style="color: #000000;"></i> TikTok
        </a>

        <a href="https://instagram.com/aizaroking" target="_blank" class="link-card">
            <i class="fab fa-instagram" style="color: #E1306C;"></i> Instagram
        </a>
    </div>

</body>
</html>
