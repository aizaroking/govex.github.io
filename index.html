<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aizaro King</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <style>
        body {
            background-color: #020b10;
            color: white;
            font-family: 'Poppins', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .profile-card {
            position: relative;
            z-index: 2;
            background: rgba(4, 18, 26, 0.75); 
            border: 1px solid rgba(0, 210, 255, 0.1); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px 20px 20px;
            border-radius: 24px;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            margin: 20px;
            animation: cardAppear 0.8s ease-out forwards;
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid #00d2ff;
            object-fit: cover;
            animation: glowPulse 2s infinite alternate;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin: 12px 0 2px;
            letter-spacing: 0.5px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        .bio {
            font-size: 12px;
            color: #00d2ff;
            margin-bottom: 6px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .location {
            color: #a0aec0;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .links-container {
            width: 100%;
            margin-bottom: 15px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 210, 255, 0.12); 
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 50px;
            display: flex;
            align-items: center;
            color: #ffffff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            transform: translateY(15px);
            animation: btnSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .discord-btn   { animation-delay: 0.15s; }
        .telegram-btn  { animation-delay: 0.25s; }
        .youtube-btn   { animation-delay: 0.35s; }
        .tiktok-btn    { animation-delay: 0.45s; }
        .instagram-btn { animation-delay: 0.55s; }
        .chat-btn      { animation-delay: 0.65s; }

        .icon-badge {
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .link-text {
            flex-grow: 1;
            text-align: center;
            margin-right: 18px;
        }

        .discord-btn .icon-badge i { color: #5865F2; }
        .telegram-btn .icon-badge i { color: #24A1DE; }
        .youtube-btn .icon-badge i { color: #FF0000; }
        .tiktok-btn .icon-badge i { color: #ffffff; }
        .instagram-btn .icon-badge i { color: #E1306C; }
        .chat-btn .icon-badge i { color: #24A1DE; }

        .discord-btn:hover {
            background: rgba(88, 101, 242, 0.15);
            border-color: #5865F2;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4), inset 0 0 10px rgba(88, 101, 242, 0.2);
        }

        .telegram-btn:hover {
            background: rgba(36, 161, 222, 0.15);
            border-color: #24A1DE;
            box-shadow: 0 0 20px rgba(36, 161, 222, 0.4), inset 0 0 10px rgba(36, 161, 222, 0.2);
        }

        .youtube-btn:hover {
            background: rgba(255, 0, 0, 0.15);
            border-color: #FF0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4), inset 0 0 10px rgba(255, 0, 0, 0.2);
        }

        .tiktok-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3), inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .instagram-btn:hover {
            background: rgba(225, 48, 108, 0.15);
            border-color: #E1306C;
            box-shadow: 0 0 20px rgba(225, 48, 108, 0.4), inset 0 0 10px rgba(225, 48, 108, 0.2);
        }

        .chat-btn:hover {
            background: rgba(36, 161, 222, 0.15);
            border-color: #24A1DE;
            box-shadow: 0 0 20px rgba(36, 161, 222, 0.4), inset 0 0 10px rgba(36, 161, 222, 0.2);
        }

        .link-card:hover {
            transform: scale(1.03);
            color: #ffffff;
        }

        .discord-status-widget {
            background: rgba(2, 11, 16, 0.6);
            border: 1px solid rgba(0, 210, 255, 0.15);
            border-radius: 16px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            text-align: left;
            margin-top: 15px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .discord-status-widget:hover {
            background: rgba(88, 101, 242, 0.1);
            border-color: rgba(88, 101, 242, 0.6);
            box-shadow: 0 0 15px rgba(88, 101, 242, 0.2);
            transform: translateY(-2px);
        }

        .widget-avatar-wrapper {
            position: relative;
            width: 40px;
            height: 40px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .widget-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .widget-status-dot {
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #04121a;
            background-color: #747f8d;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .widget-info {
            flex-grow: 1;
            overflow: hidden;
        }

        .widget-username {
            font-weight: 600;
            font-size: 13px;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        .widget-status-text {
            font-size: 11px;
            color: #a0aec0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @keyframes glowPulse {
            from { box-shadow: 0 0 8px rgba(0, 210, 255, 0.3); }
            to { box-shadow: 0 0 22px rgba(0, 210, 255, 0.6); }
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes btnSlideIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <canvas id="particles-canvas"></canvas>

    <div class="profile-card">
        <img src="https://cdn.discordapp.com/avatars/1285381904559767594/40ccf6b216964ef5bc844788107efca6.png?size=256" alt="Aizaro" class="profile-img">
        
        <h1>AIZARO KING</h1>
        <div class="bio">Gamer & Content Creator</div>
        <div class="location">Morocco <span class="flag">🇲🇦</span></div>

        <div class="links-container">
            <a href="https://discord.com/users/1285381904559767594" target="_blank" class="link-card discord-btn">
                <div class="icon-badge"><i class="fab fa-discord"></i></div>
                <div class="link-text">Discord</div>
            </a>
            
            <a href="https://t.me/addlist/ucGIsjr5HtRjNjc8" target="_blank" class="link-card telegram-btn">
                <div class="icon-badge"><i class="fab fa-telegram"></i></div>
                <div class="link-text">Telegram</div>
            </a>
            
            <a href="https://youtube.com/@aizaroking" target="_blank" class="link-card youtube-btn">
                <div class="icon-badge"><i class="fab fa-youtube"></i></div>
                <div class="link-text">YouTube</div>
            </a>

            <a href="https://tiktok.com/@aizaroking" target="_blank" class="link-card tiktok-btn">
                <div class="icon-badge"><i class="fab fa-tiktok"></i></div>
                <div class="link-text">TikTok</div>
            </a>

            <a href="https://instagram.com/aizaroking" target="_blank" class="link-card instagram-btn">
                <div class="icon-badge"><i class="fab fa-instagram"></i></div>
                <div class="link-text">Instagram</div>
            </a>

            <a href="https://t.me/aymane" target="_blank" class="link-card chat-btn">
                <div class="icon-badge"><i class="fab fa-telegram-plane"></i></div>
                <div class="link-text">Private Message</div>
            </a>
        </div>

        <a href="https://discord.com/users/1285381904559767594" target="_blank" class="discord-status-widget">
            <div class="widget-avatar-wrapper">
                <img src="https://cdn.discordapp.com/avatars/1285381904559767594/40ccf6b216964ef5bc844788107efca6.png?size=256" id="w-avatar" class="widget-avatar" alt="Discord Avatar">
                <div id="w-status-dot" class="widget-status-dot"></div>
            </div>
            <div class="widget-info">
                <div id="w-username" class="widget-username">aymane</div>
                <div id="w-status-text" class="widget-status-text">loading...</div>
            </div>
        </a>
    </div>

    <script>
        const DISCORD_ID = "1285381904559767594";
        let lastOnlineTime = localStorage.getItem('last_online_time') || Date.now();

        function timeAgo(timestamp) {
            const now = Date.now();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);

            if (minutes < 1) return "just now";
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            return "offline";
        }

        async function fetchDiscordStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const data = await response.json();
                
                if (data.success && data.data) {
                    const user = data.data;
                    
                    if (user.discord_user && user.discord_user.username) {
                        document.getElementById('w-username').innerText = user.discord_user.username;
                    }

                    if(user.discord_user && user.discord_user.avatar) {
                        const avatarUrl = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${user.discord_user.avatar}.png?size=256`;
                        document.getElementById('w-avatar').src = avatarUrl;
                    }

                    const statusDot = document.getElementById('w-status-dot');
                    const statusText = document.getElementById('w-status-text');

                    let customStatus = "";
                    if (user.activities && user.activities.length > 0) {
                        const game = user.activities.find(act => act.type === 0);
                        if (game) {
                            customStatus = `Playing ${game.name}`;
                        } else if (user.activities[0].state) {
                            customStatus = user.activities[0].state;
                        }
                    }

                    if (user.discord_status !== 'offline') {
                        lastOnlineTime = Date.now();
                        localStorage.setItem('last_online_time', lastOnlineTime);
                    }

                    switch (user.discord_status) {
                        case 'online':
                            statusDot.style.backgroundColor = '#23a55a';
                            statusText.innerText = customStatus ? customStatus : "online";
                            break;
                        case 'idle':
                            statusDot.style.backgroundColor = '#f0b232';
                            statusText.innerText = customStatus ? customStatus : "idle";
                            break;
                        case 'dnd':
                            statusDot.style.backgroundColor = '#f23f43';
                            statusText.innerText = customStatus ? customStatus : "do not disturb";
                            break;
                        default:
                            statusDot.style.backgroundColor = '#747f8d';
                            statusText.innerText = `last seen ${timeAgo(parseInt(lastOnlineTime))}`;
                    }
                }
            } catch (error) {
                console.error("Error fetching Discord status:", error);
            }
        }
        
        fetchDiscordStatus();
        setInterval(fetchDiscordStatus, 15000);

        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const maxDistance = 100;

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 210, 255, 0.4)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particlesArray = [];
            const numberOfParticles = Math.floor((canvas.width * canvas.height) / 9000);
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function connectParticles() {
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    const dx = particlesArray[a].x - particlesArray[b].x;
                    const dy = particlesArray[a].y - particlesArray[b].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < maxDistance) {
                        const opacity = 1 - (distance / maxDistance);
                        ctx.strokeStyle = `rgba(0, 210, 255, ${opacity * 0.15})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connectParticles();
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
