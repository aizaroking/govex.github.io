<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIZARO KING</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid #00d2ff;
            box-shadow: 0 0 15px #00d2ff;
        }
        h1 {
            font-size: 24px;
            margin: 15px 0 5px;
            letter-spacing: 1px;
        }
        .location {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .links-container {
            max-width: 400px;
            margin: 0 auto;
        }
        .link-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px;
            margin: 12px 0;
            border-radius: 12px;
            display: block;
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .link-card:hover {
            background: #00d2ff;
            color: #0f172a;
            box-shadow: 0 0 15px #00d2ff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <img src="https://via.placeholder.com/100" alt="Aizaro" class="profile-img">
    <h1>AIZARO KING</h1>
    <div class="location">📍 Morocco</div>

    <div class="links-container">
        <a href="https://discord.com" target="_blank" class="link-card">Discord 💬</a>
        <a href="https://t.me" target="_blank" class="link-card">Telegram ✈️</a>
        <a href="https://github.com/aizaroking" target="_blank" class="link-card">GitHub 🐙</a>
    </div>

</body>
</html>
